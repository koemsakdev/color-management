<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Management</title>

    <!-- Google Icon -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="custom/style.css" />
  </head>
  <body>
    <div
      class="mx-auto w-full lg:w-4xl md:w-6xl sm:w-full p-8 mt-12 shadow-sm rounded-2xl"
    >
      <div class="flex items-center justify-between">
        <h1 class="text-4xl flex flex-col gap-1 font-bold">
          Colors
          <span class="text-sm text-slate-400 font-light"
            >Manage your colors here</span
          >
        </h1>

        <button
          command="show-modal"
          commandfor="dialog"
          class="flex items-center gap-2 px-4 py-3 cursor-pointer text-white bg-blue-500 hover:bg-blue-600 transition duration-300 rounded-full text-sm"
        >
          <span class="material-icons"> add </span>
          Add Color
        </button>
      </div>

      <hr class="my-6 border-b border-0 border-blue-200" />

      <!-- Card Section -->
      <div
        class="grid lg:grid-cols-3 md:grid-cols-3 sm:grid-cols-2 grid-cols-1"
        id="output"
      ></div>

      <!-- Empty State -->
      <div class="mx-auto p-4 w-full max-w-4xl" id="emptyState">
        <p class="text-sm text-slate-500 flex flex-col items-center gap-2">
          <span class="material-icons text-slate-500"> layers_clear </span>
          No color avialable yet. Please add one
        </p>

        <button
          command="show-modal"
          commandfor="dialog"
          class="px-4 py-1 flex items-center gap-2 text-sm bg-blue-400 hover:bg-blue-500 text-white rounded-full cursor-pointer transition duration-500 mx-auto mt-3"
        >
          <span class="material-icons text-xs"> add </span>
          Add Color
        </button>
      </div>
    </div>

    <!-- Create dialog form -->
    <el-dialog>
      <dialog
        id="dialog"
        aria-labelledby="dialog-title"
        class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent"
      >
        <el-dialog-backdrop
          class="fixed inset-0 bg-gray-900/50 transition-opacity data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in"
        ></el-dialog-backdrop>

        <div
          tabindex="0"
          class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center sm:p-0"
        >
          <el-dialog-panel
            class="relative transform overflow-hidden rounded-md bg-white text-left shadow-xl outline -outline-offset-1 outline-white/10 transition-all data-closed:translate-y-4 data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in sm:my-8 sm:w-full sm:max-w-lg data-closed:sm:translate-y-0 data-closed:sm:scale-95"
          >
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
              <h2 class="text-2xl font-bold mb-4">Create Color</h2>

              <div class="w-full flex flex-col gap-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                  <div class="flex flex-col gap-1.5">
                    <label for="titleEn">Enter Color Name</label>
                    <input
                      type="text"
                      id="titleEn"
                      placeholder="Enter your color name"
                      class="rounded-full px-4 py-2 ring-1 focus-visible:ring-2 ring-blue-200 outline-0 bg-zinc-50"
                    />
                  </div>
                  <div class="flex flex-col gap-1.5">
                    <label for="titleKh">បញ្ជូលឈ្មោះ ពណ៌</label>
                    <input
                      type="text"
                      id="titleKh"
                      placeholder="បញ្ជូលឈ្មោះ ពណ៌ របស់អ្នក"
                      class="rounded-full px-4 py-2 ring-1 focus-visible:ring-2 ring-blue-200 outline-0 bg-zinc-50"
                    />
                  </div>
                </div>
                <div class="flex flex-col gap-1.5">
                  <label for="colorHex"
                    >ជ្រើសរើសពណ៌ឳ្យត្រូវនឹងឈ្មោះដែរអ្នកបានដាក់</label
                  >

                  <div class="flex items-center gap-2 w-full">
                    <div class="color-picker-wrapper">
                      <input type="color" name="colorHex" id="colorHex" />
                    </div>
                    <input
                      type="text"
                      id="colorHexDisplay"
                      readonly
                      class="rounded-full px-4 py-2 ring-1 focus-visible:ring-2 ring-blue-200 outline-0 bg-zinc-50"
                    />
                  </div>
                </div>
              </div>
            </div>

            <div
              class="bg-slate-200/25 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6"
            >
              <button
                type="button"
                id="saveColor"
                class="cursor-pointer inline-flex items-center gap-2 w-full justify-center rounded-md bg-blue-500 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-600 sm:ml-3 sm:w-auto"
              >
                <span class="material-icons !text-[16px]" id="icon-action">
                  save
                </span>
                <span id="saveTxt">Save</span>
              </button>
              <button
                type="button"
                command="close"
                commandfor="dialog"
                class="cursor-pointer mt-3 inline-flex w-full justify-center rounded-md bg-slate-500/10 px-3 py-2 text-sm font-semibold text-slate-900 inset-ring inset-ring-slate-500/5 hover:bg-slate-500/20 sm:mt-0 sm:w-auto"
              >
                Cancel
              </button>
            </div>
          </el-dialog-panel>
        </div>
      </dialog>
    </el-dialog>

    <script
      src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1"
      type="module"
    ></script>
    <!-- Custom JS -->
    <script src="custom/script.js"></script>
  </body>
</html>
